name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/tests.yml

  build-and-publish:
    name: Build and Publish to PyPI
    runs-on: ubuntu-latest
    needs: ci
    environment: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify version
        id: version
        shell: bash
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(grep -oP "__version__\s*=\s*['\"]\\K[^'\"]+(?=['\"])" src/bifrost_bridge/__init__.py)
          TAG_VERSION="${RELEASE_TAG#v}"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: tag version ($TAG_VERSION) does not match package version ($VERSION)"
            exit 1
          fi
          if ! git show-ref --tags --verify --quiet "refs/tags/$RELEASE_TAG"; then
            echo "ERROR: release ref ($RELEASE_TAG) is not a tag"
            exit 1
          fi
          TAG_SHA=$(git rev-list -n 1 "$RELEASE_TAG")
          HEAD_SHA=$(git rev-parse HEAD)
          if [ "$TAG_SHA" != "$HEAD_SHA" ]; then
            echo "ERROR: release tag ($RELEASE_TAG) does not point to the checked-out commit"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Check package
        run: |
          python -m twine check dist/*

      - name: Upload to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
