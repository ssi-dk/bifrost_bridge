name: Publish to Anaconda

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 1.0.0)"
        required: false
        default: ""

jobs:
  build-and-publish:
    name: Build and Publish to Anaconda
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.11"
          channels: conda-forge,defaults
          channel-priority: strict

      - name: Install conda-build
        shell: bash -el {0}
        run: |
          conda install -y conda-build anaconda-client

      - name: Verify version
        id: version
        run: |
          VERSION=$(grep -oP "__version__\s*=\s*['\"]\\K[^'\"]+(?=['\"])" src/bifrost_bridge/__init__.py)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build conda package
        shell: bash -el {0}
        run: |
          conda build conda --output-folder ./conda-bld

      - name: Upload to Anaconda
        shell: bash -el {0}
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_API_TOKEN }}
        run: |
          PACKAGE=$(find ./conda-bld -type f \( -name "bifrost_bridge-*.tar.bz2" -o -name "bifrost_bridge-*.conda" \) | head -1)
          if [ -z "$PACKAGE" ]; then
            echo "ERROR: No package found in conda-bld"
            find ./conda-bld -type f
            exit 1
          fi
          echo "Uploading: $PACKAGE"
          anaconda upload --user <TODO: Add anaconda user> --force "$PACKAGE"
